name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build release APK
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: ./gradlew assembleRelease --no-daemon
        env:
          HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}

      - name: Build debug APK (unsigned fallback)
        if: ${{ env.HAS_SIGNING != 'true' }}
        run: ./gradlew assembleDebug --no-daemon
        env:
          HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}

      - name: Decode keystore
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
        env:
          HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi
          # Write to file for the release body
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "Generated changelog from ${PREV_TAG:-beginning} to HEAD"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: A-Launcher ${{ steps.version.outputs.VERSION }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: false
